services:
  library-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library-service
    security_opt:
      - seccomp=unconfined
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
